services:
  # Flask dashboard
  - type: web
    name: cr-obituaries-dashboard
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11

  # Daily scraper cron
  - type: cron
    name: cr-obituaries-scraper
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r requirements.txt
    schedule: "0 11 * * *"
    startCommand: python scheduler/run_daily.py
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
