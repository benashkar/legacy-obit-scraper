services:
  # Flask dashboard
  - type: web
    name: cr-obituaries-dashboard
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: DB_NAME
        value: cr_obituaries
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.11

  # Daily scraper cron
  - type: cron
    name: cr-obituaries-scraper
    runtime: python
    region: ohio
    plan: starter
    buildCommand: pip install -r requirements.txt
    schedule: "0 11 * * *"
    startCommand: python scheduler/run_daily.py
    envVars:
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
      - key: DB_NAME
        value: cr_obituaries
      - key: PYTHON_VERSION
        value: 3.11.11
